services:
  detection-db:
    build:
      context: ../detection-db
      dockerfile: Dockerfile
    container_name: detection-db
    restart: unless-stopped
    ports:
      - 5433:5432
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ueba_detection}
      POSTGRES_USER: ${POSTGRES_USER:-ueba_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - detection-db-data:/var/lib/postgresql/data
      - ../detection-db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ../detection-db/functions.sql:/docker-entrypoint-initdb.d/02-functions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ueba_admin} -d ${POSTGRES_DB:-ueba_detection}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ueba-network

  detection-api:
    build:
      context: ../detection-api
      dockerfile: Dockerfile.dev
    container_name: detection-api
    restart: unless-stopped
    ports:
      - 8081:8081
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ueba_admin}:${POSTGRES_PASSWORD}@detection-db:5432/${POSTGRES_DB:-ueba_detection}
      API_HOST: 0.0.0.0
      API_PORT: 8081
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ../detection-api/app:/app/app:ro
    depends_on:
      detection-db:
        condition: service_healthy
    networks:
      - ueba-network

  detection-dashboard:
    build:
      context: ../detection-dashboard
      dockerfile: Dockerfile.dev
    container_name: detection-dashboard
    restart: unless-stopped
    ports:
      - 8082:8082
    depends_on:
      - detection-api
    networks:
      - ueba-network

volumes:
  detection-db-data:

networks:
  ueba-network:
    driver: bridge
